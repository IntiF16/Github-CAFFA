<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penca Caffa - Cargar Pronóstico</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00ff87;
            --accent-hover: #00cc6a;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .bet-page-container {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 255, 135, 0.15);
            text-align: center;
        }

        .user-tag {
            background-color: #1a2421;
            color: var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 135, 0.3);
        }

        .match-workspace {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
        }

        .team-block { flex: 1; text-align: center; }
        .team-block img { width: 75px; height: 48px; object-fit: cover; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: block; margin: 0 auto 12px; }
        .team-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }

        .vs-divider { font-size: 1.6rem; font-weight: bold; color: var(--accent-color); }

        .goals-input {
            width: 70px;
            padding: 10px;
            font-size: 1.5rem;
            text-align: center;
            background-color: #000;
            color: #fff;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-weight: bold;
        }
        .goals-input:focus { border-color: var(--accent-color); outline: none; }

        .actions-layout {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            flex: 1;
        }

        .btn-success { background-color: var(--accent-color); color: #000; }
        .btn-success:hover { background-color: var(--accent-hover); }
        .btn-back { background-color: #444; color: #fff; }
        .btn-back:hover { background-color: #333; }
    </style>
</head>
<body>

    <div class="bet-page-container">
        <h2 style="margin-top: 0;">Ingresar Pronóstico</h2>
        <div id="session-user-badge" class="user-tag">Cargando jugador...</div>
        
        <div class="match-workspace">
            <div class="team-block">
                <img id="flag-local" src="" alt="Bandera">
                <div id="name-local" class="team-name">Local</div>
                <input type="number" id="input-goals-local" class="goals-input" min="0" placeholder="0">
            </div>

            <div class="vs-divider">VS</div>

            <div class="team-block">
                <img id="flag-visitante" src="" alt="Bandera">
                <div id="name-visitante" class="team-name">Visitante</div>
                <input type="number" id="input-goals-visitante" class="goals-input" min="0" placeholder="0">
            </div>
        </div>

        <div class="actions-layout">
            <button class="btn btn-back" onclick="volverAlInicio()">← Volver</button>
            <button class="btn btn-success" onclick="guardarPrediccionPagina()">Guardar Jugada</button>
        </div>
    </div>

    <script src="fnted.js"></script>
</body>
</html>
