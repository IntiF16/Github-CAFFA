<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penca Caffa - Cargar Pronóstico</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00ff87;
            --accent-hover: #00cc6a;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .bet-page-container {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            box-sizing: border-box;
            text-align: center;
        }

        .user-tag {
            background: #121212;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .match-workspace {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 40%;
        }

        .team-block img {
            width: 70px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            background: #222;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .goals-input {
            width: 60px;
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            padding: 6px;
            border-radius: 6px;
        }
        .goals-input:focus { border-color: var(--accent-color); outline: none; }

        .vs-divider {
            font-size: 1.2rem;
            font-weight: 900;
            color: #555;
        }

        .actions-layout {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn-form {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-success { background-color: var(--accent-color); color: #000; }
        .btn-success:hover { background-color: var(--accent-hover); }
        .btn-back { background-color: #444; color: #fff; }
        .btn-back:hover { background-color: #333; }
    </style>
</head>
<body>

    <div class="bet-page-container">
        <h2 style="margin-top: 0;">Ingresar Pronóstico</h2>
        <div id="session-user-badge" class="user-tag">Cargando jugador...</div>
        
        <div class="match-workspace">
            <div class="team-block">
                <img id="flag-local" src="" alt="Bandera">
                <div id="name-local" class="team-name">Local</div>
                <input type="number" id="input-goals-local" class="goals-input" min="0" placeholder="0">
            </div>

            <div class="vs-divider">VS</div>

            <div class="team-block">
                <img id="flag-visitante" src="" alt="Bandera">
                <div id="name-visitante" class="team-name">Visitante</div>
                <input type="number" id="input-goals-visitante" class="goals-input" min="0" placeholder="0">
            </div>
        </div>

        <div class="actions-layout">
            <button class="btn-form btn-back" onclick="window.location.href='index.html'">Volver</button>
            <button class="btn-form btn-success" onclick="guardarPronostico()">Guardar</button>
        </div>
    </div>

    <script src="fnted.js"></script>
</body>
</html>
